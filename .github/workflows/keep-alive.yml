 name: Keep Render Alive

on:
  schedule:
    - cron: '*/14 * * * *'  # every 14 minutes
  workflow_dispatch:  # manual trigger too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: |
          curl --fail https://YOUR-RENDER-URL.onrender.com/api/tournaments || echo "Ping failed but continuing"